# SCHEMA_CHANGES.yaml
# Structural changes to the GeoCover 2D data model.
# Keyed by model version. Append at top. Never modify past entries.
# Major and minor version bumps (x.y.0) MUST have an entry here.
# Patch versions (x.y.z) are code/tooling only → see CHANGELOG.md instead.
# Cross-reference: DATA_RELEASES.yaml references these via schema_version.

schema_versions:

  - version: "4.3.1"
    git_tag: "v4.3.1"
    date: "2026-02-16"
    note: "Patch release — tooling fixes only (fixing double German columns. Schema export date is the SDE state used for R16."

  - version: "4.3.0"
    git_tag: "v4.3.0"
    date: "2026-03-25"
    note: "Schema update (GMU code) for new mapsheet of Ticino."
    changes:
      - class: "Surfaces_PLG"
        attribute: ~
        type: "class_content_removed"
        description_de: "Alle hydrologischen Flächen (Gletscher, Seen und Flüsse) wurden entfernt"
        description_fr: "Toutes les surfaces hydrologiques (glaciers, lacs et rivières) ont été supprimées"
        motivation: >
          Topographic data is updated more frequently than geological data, causing
          systematic inconsistencies at boundaries. Hydrological surfaces will now
          be sourced directly from swisstopo topographic products.

      - class: "Bedrock_PLG"
        attribute: ~
        type: "data_fill"
        description_de: "Alle von Gletschern überdeckten Gebiete wurden mit einem undifferenzierten Bedrock-Objekt aufgefüllt"
        description_fr: "Toutes les zones recouvertes par des glaciers ont été remplies avec un objet de type Bedrock indifférencié"
        motivation: ~

      - class: "Unconsolidated_Deposits_PLG"
        attribute: ~
        type: "data_fill"
        description_de: "Alle Gebiete von Flüssen oder Seen bedeckt, wurden mit undifferenziertes Quartär ausgefüllt"
        description_fr: "Toutes les zones recouvertes par des rivières ou des lacs ont été remplies avec un objet de type Quaternaire indifférencié"
        motivation: ~

      - class: "Bedrock_PLG"
        attribute: "Geol_Mapping_Unit, Tecto, Litho"
        type: "hierarchy_changed"
        description_de: "Hinzugefügte, gelöschte Objekte und/oder modifizierte Hierarchie"
        description_fr: "Objets de listes de valeurs supprimés et/ou hiérarchie modifiée"
        motivation: ~

      - class: "Unconsolidated_Deposits_PLG"
        attribute: "Geol_Mapping_Unit, Litho"
        type: "hierarchy_changed"
        description_de: "Hinzugefügte, gelöschte Objekte und/oder modifizierte Hierarchie"
        description_fr: "Objets de listes de valeurs supprimés et/ou hiérarchie modifiée"
        motivation: ~

  - version: "4.2.0"
    git_tag: "v4.2.0"
    date: "2025-11-26"
    model_transition: "4.1 -> 4.2"
    note: ""
    changes:
      - class: "UNCO_DEPOSIT / BEDROCK"
        attribute: "MORE_INFO"
        type: "content_cleared"
        description_fr: "Cleanup — metadata content cleared / contenu (métadonnées) effacé"
        motivation: ~

  - version: "4.1.1"
    git_tag: "v4.1.1"
    date: "2025-11-26"
    note: "Small translation errors on 4.1"
    changes: []

  - version: "4.1"
    git_tag: "v4.1.0"
    date: "2025-08-26"
    model_transition: "4.0 -> 4.1"
    changes:
      - class: "BEDROCK"
        attribute: ~
        type: "domain_source_changed"
        from: "coded_domain inline"
        to: "Geological Mapping Unit (GMU/KE)"
        description_de: "Einführung von Kartiereinheit (GMU)"
        description_fr: "Introduction des Geological Mapping Unit (KE)"
        motivation: >
          KE provides a single point of truth managed by the geology team,
          reducing duplication between schema and legend files.

      

      - class: "GC_SURFACES"
        attribute: "KIND"
        type: "value_added"
        values:
          - { de: "Kame", fr: "Kame" }

      - class: "GC_LINEAR_OBJECTS"
        attribute: "KIND"
        type: "value_added"
        values:
          - { de: "periglazialer Wulst im Allg.", fr: "bourrelet périglaciaire en général" }
          - { de: "neotektonischer Bruch",        fr: "faille néotectonique" }

  - version: "4.0"
    git_tag: v4.0.0
    date: "2024-09-10"
    note: "First version generated by the lg-geology-data-model codebase (R13)."
    legacy_transition: True


  - version: "3.0"
    git_tag: ~
    date: "2017-11-13"
    note: "Major revision. Published 2017-11-13."
    legacy_transition: True

