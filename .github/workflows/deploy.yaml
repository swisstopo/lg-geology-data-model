name: Upload artifacts to S3

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 4.3.3)'
        required: true
      sources_dir:
        description: 'Sources directory path (e.g., sources/2026-02-12)'
        required: true
  workflow_call:
    inputs:
      version:
        type: string
        required: true
      sources_dir:
        type: string
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Print release variables
      run: |
        echo "=== RELEASE=${{ inputs.version }} ==="
        echo "=== SOURCES_DIR=${{ inputs.sources_dir }} ==="

    - name: Download artifacts from build
      uses: actions/download-artifact@v8
      with:
        name: geology-data-model-${{ inputs.version }}

    - name: Upload folder to bucket
      uses: a-sync/s3-uploader@master
      with:
        args: --recursive --exclude "*.log"
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: 'eu-central-1'
        S3_BUCKET: ${{ secrets.AWS_BUCKET }}
        S3_KEY: datamodel/${{ inputs.version }}
        FILE: './outputs'
