# .github/workflows/release.yaml
# Combined workflow: Auto-tag on version bump + Release assets
#
# Triggers:
#   1. Push to master with release.yaml change → creates tag + releases
#   2. Manual tag push (v*.*.*) → releases only
#   3. workflow_dispatch → manual trigger
#
name: Release

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths: [release.yaml]
    tags:
      - "v*.*.*"

jobs:
  # ==========================================================================
  # Step 1: Determine if we should release and get version info
  # ==========================================================================
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      tag_name: ${{ steps.info.outputs.tag_name }}
      sources_dir: ${{ steps.info.outputs.sources_dir }}
      should_release: ${{ steps.info.outputs.should_release }}
      is_tag_push: ${{ steps.info.outputs.is_tag_push }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Determine release info
        id: info
        run: |
          # Case 1: Triggered by tag push
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#v}"
            
            # Get sources_dir from release.yaml
            if [ -f "release.yaml" ]; then
              SOURCES_DIR=$(python -c "import yaml; print(yaml.safe_load(open('release.yaml'))['model']['sources_dir'])")
            else
              SOURCES_DIR=$(python -c "import yaml; print(yaml.safe_load(open('datamodel.yaml'))['model']['sources_dir'])")
            fi
            
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "tag_name=$TAG" >> $GITHUB_OUTPUT
            echo "sources_dir=$SOURCES_DIR" >> $GITHUB_OUTPUT
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "is_tag_push=true" >> $GITHUB_OUTPUT
            echo "📦 Tag push detected: $TAG"
            exit 0
          fi
          
          # Case 2: Triggered by release.yaml change - check for version bump
          NEW=$(python -c "import yaml; print(yaml.safe_load(open('release.yaml'))['model']['revision'])")
          OLD=$(git show HEAD~1:release.yaml 2>/dev/null | python -c "import yaml,sys; print(yaml.safe_load(sys.stdin).get('model',{}).get('revision',''))" || echo "")
          SOURCES_DIR=$(python -c "import yaml; print(yaml.safe_load(open('release.yaml'))['model']['sources_dir'])")
          
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag_name=v$NEW" >> $GITHUB_OUTPUT
          echo "sources_dir=$SOURCES_DIR" >> $GITHUB_OUTPUT
          echo "is_tag_push=false" >> $GITHUB_OUTPUT
          
          if [ "$NEW" != "$OLD" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "📦 Version bump detected: $OLD → $NEW"
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "ℹ️ No version change, skipping release"
          fi

  # ==========================================================================
  # Step 2: Create tag (only if triggered by release.yaml change, not tag push)
  # ==========================================================================
  create-tag:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true' && needs.check-version.outputs.is_tag_push == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create and push tag
        run: |
          TAG=${{ needs.check-version.outputs.tag_name }}
          
          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "⚠️ Tag $TAG already exists, skipping"
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          echo "✅ Created tag $TAG"

  # ==========================================================================
  # Step 3: Build (reuse existing build workflow)
  # ==========================================================================
  build:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    uses: ./.github/workflows/build.yaml

  # ==========================================================================
  # Step 4: Create GitHub Release and upload assets
  # ==========================================================================
  release:
    needs: [check-version, build]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE: ${{ needs.check-version.outputs.version }}
      TAG_NAME: ${{ needs.check-version.outputs.tag_name }}
      SOURCES_DIR: ${{ needs.check-version.outputs.sources_dir }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Print release variables
        run: |
          echo "=== RELEASE=${{ env.RELEASE }} ==="
          echo "=== TAG_NAME=${{ env.TAG_NAME }} ==="
          echo "=== SOURCES_DIR=${{ env.SOURCES_DIR }} ==="

      - name: Generate release notes
        id: release_info
        run: |
          CURRENT_TAG="${{ env.TAG_NAME }}"
          
          # Get previous tag
          PREVIOUS_TAG=$(git tag --sort=-v:refname | grep -v "^${CURRENT_TAG}$" | head -1)
          
          echo "Current Tag: $CURRENT_TAG"
          echo "Previous Tag: $PREVIOUS_TAG"
          
          # Build release notes
          RELEASE_BODY="## Release Notes for $CURRENT_TAG\n\n"
          
          if [ -n "$PREVIOUS_TAG" ]; then
            RELEASE_BODY+="### Changes since $PREVIOUS_TAG:\n"
            COMMITS=$(git log --pretty=format:"* %s" "$PREVIOUS_TAG".."HEAD" 2>/dev/null || echo "")
            if [ -n "$COMMITS" ]; then
              RELEASE_BODY+="$COMMITS\n\n"
            else
              RELEASE_BODY+="No specific changes found.\n\n"
            fi
          else
            RELEASE_BODY+="### Initial Release\n"
            RELEASE_BODY+="This is the first release for this project!\n\n"
          fi
          
          RELEASE_BODY+="See attached artifacts for documentation."
          
          echo -e "$RELEASE_BODY" > .release_body.txt
          echo "release_body_path=.release_body.txt" >> "$GITHUB_OUTPUT"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: geology-data-model-${{ env.RELEASE }}
          path: ./temp-artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          
          # Copy with language-specific names
          cp temp-artifacts/outputs/de/datamodel.pdf release-assets/datamodel-de.pdf
          cp temp-artifacts/outputs/fr/datamodel.pdf release-assets/datamodel-fr.pdf
          cp temp-artifacts/outputs/de/datamodel.docx release-assets/datamodel-de.docx
          cp temp-artifacts/outputs/fr/datamodel.docx release-assets/datamodel-fr.docx
          cp temp-artifacts/outputs/ER-GCOVER.svg release-assets/ER-GCOVER.svg
          cp temp-artifacts/outputs/ER-GCOVER.pdf release-assets/ER-GCOVER.pdf
          cp temp-artifacts/outputs/DATA_RELEASES.pdf release-assets/DATA_RELEASES.pdf
          cp temp-artifacts/outputs/SCHEMA_CHANGES.pdf release-assets/SCHEMA_CHANGES.pdf
          cp temp-artifacts/outputs/*.pdf  release-assets/
          cp temp-artifacts/${{ env.SOURCES_DIR }}/gcoverp_export_simple.json release-assets/gcoverp_export_simple.json
          
          echo "📦 Release assets:"
          ls -la release-assets/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1.21.0
        with:
          token: ${{ secrets.TOKEN }}
          tag: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
          bodyFile: ${{ steps.release_info.outputs.release_body_path }}
          allowUpdates: true
          draft: false
          prerelease: false
          artifacts: release-assets/*

      - name: Upload assets with gh CLI (backup)
        env:
          GITHUB_TOKEN: ${{ secrets.TOKEN }}
        run: |
          TAG="${{ env.TAG_NAME }}"
          
          for file in release-assets/*; do
            echo "📤 Uploading $(basename $file)..."
            gh release upload "$TAG" "$file" --clobber || true
          done
          
          echo "✅ All assets uploaded"
