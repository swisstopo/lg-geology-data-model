name: Generate markdown and PDF documents


on:
  workflow_call:
    inputs:
      is_release_build:
        description: 'True for production releases (clean version in document metadata, no dev suffix)'
        type: boolean
        default: false
  workflow_dispatch:
  push:
    branches:
      - 'releases/**'
      - 'release/**'
  pull_request:
    branches:
      - master
      - develop
      - 'releases/**'
      - 'release/**'



jobs:
  build-markdown:
    name: Generating Markdown files
    runs-on: "ubuntu-latest"
    services:
      kroki:
        image: yuzutech/kroki
        ports:
          - 1234:8000
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Cache apt packages
        uses: actions/cache@v5.0.5
        with:
          path: /var/cache/apt/archives
          key: apt-texlive-${{ runner.os }}-v1
          restore-keys: apt-texlive-${{ runner.os }}-

      - name: Install TeX Live and system dependencies  # removed  texlive-fonts-extra
        run: |
          # Switch away from the slow Azure mirror
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || \
          sudo sed -i 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list || true
          sudo apt-get update
          sudo apt-get install -y \
            tar \
            texlive-xetex texlive-fonts-recommended texlive-plain-generic \
            poppler-utils fonts-noto-core fonts-liberation librsvg2-bin

      - name: Cache tlmgr user packages
        uses: actions/cache@v5.0.5
        with:
          path: ~/texmf
          key: tlmgr-2023-fontawesome5-v1

      - name: Install required LaTeX packages
        run: |
          tlmgr init-usertree || true
          tlmgr option repository https://ftp.math.utah.edu/pub/tex/historic/systems/texlive/2023/tlnet-final
          tlmgr install fontawesome5

      - name: Install miniconda
        uses: conda-incubator/setup-miniconda@v4.0.1
        with:
          python-version: 3.12
          channels: conda-forge,defaults
          channel-priority: true
          activate-environment: DATAMODEL
          environment-file: environment.yaml


      - name: Install gcover and pandoc
        shell: bash -el {0}
        run: |
          conda install -c conda-forge  pandoc gdal -y
          conda install -c swisstopo    "gcover>=0.8.3"  -y
          mkdir -p  /home/runner/.config/gcover && touch /home/runner/.config/gcover/config.yaml
          gcover --version
          pandoc -v
      - name: Check conda installation
        shell: bash -el {0}
        run: |
          conda install -c conda-forge  pandoc gdal>=3.11 -y
          conda info
          conda list
          conda config --show-sources
          conda config --show
          printenv | sort

      - name: Set version info
        shell: bash -l {0}
        run: |
          echo "version=$(<VERSION)" >> $GITHUB_ENV
          RELEASE=$(python -c "import yaml; print(yaml.safe_load(open('release.yaml'))['model']['revision'])")
          EXPORT_DIR=$(python -c "import yaml; print(yaml.safe_load(open('release.yaml'))['model']['sources_dir'])")
          echo "RELEASE=$RELEASE" >> $GITHUB_ENV
          echo "EXPORT_DIR=$EXPORT_DIR" >> $GITHUB_ENV
          IS_RELEASE="${{ inputs.is_release_build }}"
          if [ "$IS_RELEASE" = "true" ]; then
            echo "DEV_SUFFIX=" >> $GITHUB_ENV
          else
            echo "DEV_SUFFIX=-dev${{ github.run_number }}" >> $GITHUB_ENV
          fi
          echo "=== RELEASE=$RELEASE IS_RELEASE=$IS_RELEASE ==="

      - name: Inject dev suffix into document metadata
        if: env.DEV_SUFFIX != ''
        shell: python
        run: |
          import yaml
          with open("release.yaml") as f:
              data = yaml.safe_load(f)
          data["model"]["revision"] = data["model"]["revision"] + "${{ env.DEV_SUFFIX }}"
          with open("release.yaml", "w") as f:
              yaml.dump(data, f, default_flow_style=False)
          print(f"Dev revision for metadata: {data['model']['revision']}")

      - name: Pip install
        shell: bash -el {0}
        run: pip install -e ".[dev]"

      - name: Validate datamodel.yaml
        shell: bash -el {0}
        run: make validate

      - name: Test
        shell: bash -el {0}
        run: make test

      - name: Build PDF, HTML and DOCX targets
        shell: bash -el {0}
        run: |
             make cleanall mds pdfs htmls docxs
             make validate-metadata

      - name: Create gcover config file
        run: |
          mkdir -p config
          cat > config/config.yaml <<'EOF'
          global:
            s3:
              bucket: "swisstopo-gcover-assets"
            mapserver: ~          # explicit null — satisfies Pydantic v2's requirement

          gdb:
              base_paths:
                RC1: /data/gdb/RC1.gdb
                RC2: /data/gdb/RC2.gdb
          EOF

      - name: Resolve V1 and V2 from exports directory
        shell: bash -el {0}
        run: |
          LAST_TWO=$(ls -1 sources/ | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' | sort | tail -n 2)
          V1=$(echo "$LAST_TWO" | head -n 1)
          V2=$(echo "$LAST_TWO" | tail -n 1)
          echo "V1=$V1" >> $GITHUB_ENV
          echo "V2=$V2" >> $GITHUB_ENV

      - name: Generate ER diagram (PlantUML)
        shell: bash -el {0}
        run: make diagram V2=${{ env.V2 }}

      - name: Render diagram to SVG and PDF via Kroki
        shell: bash -el {0}
        run: |
          make puml-svg PUML_FILE=outputs/diagram.puml KROKI_URL=http://localhost:1234
          make puml-pdf PUML_FILE=outputs/diagram.puml

      - name: Generate diff report
        shell: bash -el {0}
        run: make diff-reports V1=${{ env.V1 }} V2=${{ env.V2 }}

      - name: Generate release notes
        shell: bash -el {0}
        run: make release-notes

      - name: Generate Excel mapping tool
        shell: bash -el {0}
        run: make excel-mapping


      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: geology-data-model-${{ env.RELEASE }}
          if-no-files-found: error
          path: |
            outputs/de/datamodel.pdf
            outputs/fr/datamodel.pdf
            outputs/it/datamodel.pdf
            outputs/en/datamodel.pdf
            outputs/de/datamodel.docx
            outputs/fr/datamodel.docx
            outputs/fr/datamodel.html
            outputs/de/datamodel.html
            outputs/it/datamodel.html
            outputs/en/datamodel.html
            outputs/de/datamodel.css
            outputs/fr/datamodel.css
            outputs/it/datamodel.css
            outputs/en/datamodel.css
            outputs/de/geocover.png
            outputs/fr/geocover.png
            outputs/it/geocover.png
            outputs/en/geocover.png
            outputs/diagram.svg
            outputs/diagram.pdf
            outputs/${{ env.V1 }}_${{ env.V2 }}.pdf
            ${{ env.EXPORT_DIR }}/gcover-schema-simple.json
            datamodel.yaml
            outputs/geology_mapping_tool*.xlsx
            outputs/DATA_RELEASES.pdf
            outputs/SCHEMA_CHANGES.pdf
